<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot Your Train</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">&larr; Back</a>
        <h2>Spot Your Train</h2>
    </div>
    <div class="form-container">
        <form action="/spot-result" method="GET">
            <div class="form-group">
                <label for="trainNo">Train No./Name</label>
                <input type="text" id="trainNo" name="trainNo" placeholder="Enter Train Number" required>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label for="day">Journey Date</label>
                <select id="day" name="day" style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <option value="yesterday">Yesterday</option>
                    <option value="today" selected>Today</option>
                    <option value="tomorrow">Tomorrow</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 15px;">Get Status</button>
        </form>
    </div>
</body>
</html>
