<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Schedule</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">&larr; Back</a>
        <h2>Train Schedule</h2>
    </div>
    <div class="form-container">
        <form action="/schedule-result" method="GET">
            <div class="form-group">
                <label for="trainNo">Train No./Name</label>
                <input type="text" id="trainNo" name="trainNo" placeholder="Enter Train Number" required>
            </div>
            <button type="submit" class="btn-primary">Get Schedule</button>
        </form>
    </div>
</body>
</html>
